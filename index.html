<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N58 Anime - Live VOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --obsidian: #050505;
            --neon-purple: #a855f7;
            --ice-blue: #38bdf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(168, 85, 247, 0.3);
        }

        body {
            background-color: var(--obsidian);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        .neon-border {
            box-shadow: 0 0 10px var(--glass-border), inset 0 0 5px var(--glass-border);
        }

        .neon-text-purple {
            text-shadow: 0 0 8px var(--neon-purple);
        }

        .neon-text-blue {
            text-shadow: 0 0 8px var(--ice-blue);
        }

        .focusable:focus {
            outline: none;
            box-shadow: 0 0 20px var(--ice-blue);
            border-color: var(--ice-blue);
            transform: scale(1.05);
            z-index: 10;
        }

        .poster-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .poster-card:hover, .poster-card:focus {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--ice-blue);
            border-color: var(--ice-blue);
        }

        .poster-card img {
            transition: filter 0.3s ease;
        }

        .poster-card:hover img, .poster-card:focus img {
            filter: brightness(0.7);
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: rgba(0,0,0,0.4);
        }

        .poster-card:hover .play-overlay, .poster-card:focus .play-overlay {
            opacity: 1;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--obsidian);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-purple);
            border-radius: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 95%;
            max-width: 1200px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #video-player {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            border: 2px solid var(--ice-blue);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            background: #000;
        }

        .episode-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scroll-behavior: smooth;
        }

        .episode-btn {
            flex: 0 0 auto;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .episode-btn:focus {
            background: var(--ice-blue);
            color: black;
            box-shadow: 0 0 15px var(--ice-blue);
            border-color: white;
            outline: none;
        }

        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(168, 85, 247, 0.2);
            border-top: 5px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #error-message {
            display: none;
            padding: 20px;
            margin-top: 20px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            text-align: center;
        }

        .source-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .source-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }

        .source-btn.active {
            background: var(--neon-purple);
            border-color: white;
            box-shadow: 0 0 10px var(--neon-purple);
        }

        .source-btn:focus {
            outline: none;
            box-shadow: 0 0 15px var(--ice-blue);
            transform: scale(1.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-4xl font-extrabold neon-text-purple tracking-tighter">N58 ANIME</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Made by Nawaf</p>
        </div>
        
        <form id="search-form" class="relative w-full md:w-96">
            <input type="text" id="search-input" placeholder="Search anime series..." 
                   class="focusable w-full bg-black/40 glass neon-border py-3 px-12 rounded-full text-sm focus:ring-0"
                   tabindex="0">
            <button type="submit" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400">
                <i class="fa fa-search"></i>
            </button>
        </form>
    </header>

    <!-- Main Content -->
    <main class="space-y-12">
        <div id="error-message"></div>

        <section id="results-section" class="hidden">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1 h-6 bg-ice-blue"></div>
                <h3 class="text-xl font-bold uppercase tracking-widest neon-text-blue">Search Results</h3>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-4" id="results-grid"></div>
        </section>

        <section id="trending-section">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-1 h-6 bg-purple-500"></div>
                <h3 class="text-xl font-bold uppercase tracking-widest neon-text-purple">Top Rated</h3>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-4" id="trending-grid"></div>
        </section>
    </main>

    <!-- Player Modal -->
    <div id="player-modal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button id="close-btn" class="absolute -top-12 right-0 text-white text-3xl hover:text-ice-blue focusable" onclick="closePlayer()" tabindex="0">
                <i class="fa fa-times"></i>
            </button>
            
            <div id="video-container">
                <video id="video-player" controls playsinline class="hidden"></video>
            </div>

            <div class="glass neon-border p-6">
                <div class="flex justify-between items-start mb-4">
                    <h4 id="video-title" class="text-2xl font-black neon-text-purple">Loading Anime...</h4>
                </div>
                
                <div class="source-toggle">
                    <button class="source-btn active focusable" onclick="setSource('consumet')" id="src-consumet" tabindex="0">CONSUMET</button>
                    <button class="source-btn focusable" onclick="setSource('torrentio')" id="src-torrentio" tabindex="0">TORRENTIO</button>
                    <button class="source-btn focusable" onclick="setSource('orion')" id="src-orion" tabindex="0">ORION</button>
                </div>

                <div id="episodes-container" class="hidden">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2">Select Episode / Stream</p>
                    <div class="episode-list focusable" id="episode-list" tabindex="0"></div>
                </div>
                <div id="meta-container" class="mt-4 text-sm text-gray-400">
                    <p id="anime-synopsis" class="line-clamp-3"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-20 py-10 border-t border-glass-border flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <p class="text-xl font-bold neon-text-purple tracking-tighter">N58 ANIME</p>
            <p class="text-[10px] text-gray-600 uppercase mt-1">Made by Nawaf</p>
        </div>
        <div class="flex gap-6 text-sm text-gray-400">
            <a href="#" class="focusable hover:text-ice-blue transition-colors" tabindex="0">Discord</a>
            <a href="#" class="focusable hover:text-ice-blue transition-colors" tabindex="0">Privacy</a>
            <a href="#" class="focusable hover:text-ice-blue transition-colors" tabindex="0">DMCA</a>
        </div>
    </footer>

    <script>
        const JIKAN_BASE = 'https://api.jikan.moe/v4';
        const CONSUMET_BASE = 'https://consumet-api-private-n58-nawafal58s-projects.vercel.app/anime/gogoanime';
        const TORRENTIO_BASE = 'https://torrentio.strem.fun';
        
        const modal = document.getElementById('player-modal');
        const video = document.getElementById('video-player');
        const titleEl = document.getElementById('video-title');
        const epList = document.getElementById('episode-list');
        const loader = document.getElementById('loading-overlay');
        const errorEl = document.getElementById('error-message');
        const synopsisEl = document.getElementById('anime-synopsis');
        
        let hls = null;
        let isModalOpen = false;
        let currentAnimeTitle = '';
        let currentImdbId = '';
        let currentMalId = '';
        let activeSource = 'consumet';

        function showError(msg) {
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }

        async function fetchJikan(endpoint) {
            const res = await fetch(`${JIKAN_BASE}${endpoint}`);
            if (!res.ok) throw new Error(`Jikan Error: ${res.status}`);
            return await res.json();
        }

        async function fetchTrending() {
            showLoader(true);
            try {
                const data = await fetchJikan('/top/anime');
                renderGrid(data.data || [], 'trending-grid');
            } catch (err) { 
                console.error(err);
                showError("Top anime load failed.");
            }
            showLoader(false);
        }

        async function searchAnime(query) {
            showLoader(true);
            try {
                const data = await fetchJikan(`/anime?q=${encodeURIComponent(query)}`);
                document.getElementById('results-section').classList.remove('hidden');
                renderGrid(data.data || [], 'results-grid');
            } catch (err) { 
                console.error(err);
                showError("Search failed.");
            }
            showLoader(false);
        }

        async function fetchInfo(malId) {
            showLoader(true);
            try {
                const data = (await fetchJikan(`/anime/${malId}`)).data;
                currentAnimeTitle = data.title;
                currentMalId = malId;
                
                titleEl.innerText = data.title;
                synopsisEl.innerText = data.synopsis || 'No synopsis available.';
                
                // Get IMDb ID via external IDs
                try {
                    const extData = await fetchJikan(`/anime/${malId}/external`);
                    const imdb = extData.data.find(x => x.name === 'IMDb');
                    currentImdbId = imdb ? imdb.url.split('/').filter(Boolean).pop() : '';
                } catch (e) {
                    console.error("External ID fetch failed", e);
                    currentImdbId = '';
                }
                
                video.classList.add('hidden');
                modal.style.display = 'flex';
                isModalOpen = true;
                
                await loadCurrentSource();
                document.getElementById('close-btn').focus();
            } catch (err) { 
                console.error(err);
                showError("Metadata error.");
            }
            showLoader(false);
        }

        function setSource(src) {
            activeSource = src;
            document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`src-${src}`).classList.add('active');
            loadCurrentSource();
        }

        async function loadCurrentSource() {
            showLoader(true);
            epList.innerHTML = '';
            try {
                if (activeSource === 'consumet') {
                    await fetchConsumet();
                } else if (activeSource === 'torrentio') {
                    await fetchTorrentio();
                } else if (activeSource === 'orion') {
                    await fetchOrion();
                }
            } catch (e) {
                console.error(e);
                epList.innerHTML = '<p class="text-gray-500">Source error.</p>';
            }
            showLoader(false);
        }

        async function fetchConsumet() {
            const query = currentAnimeTitle.split(' ').slice(0, 3).join(' ');
            const searchRes = await fetch(`${CONSUMET_BASE}/${encodeURIComponent(query)}`);
            const searchData = await searchRes.json();
            if (searchData.results && searchData.results.length > 0) {
                const foundAnime = searchData.results[0];
                const infoRes = await fetch(`${CONSUMET_BASE}/info/${foundAnime.id}`);
                const infoData = await infoRes.json();
                renderEpisodes(infoData.episodes, 'consumet');
                document.getElementById('episodes-container').classList.remove('hidden');
            } else {
                throw new Error('No Consumet results');
            }
        }

        async function fetchTorrentio() {
            if (!currentImdbId) throw new Error('No IMDb ID');
            // Try series first
            let url = `${TORRENTIO_BASE}/stream/series/${currentImdbId}:1:1.json`;
            let res = await fetch(url);
            let data = await res.json();
            
            if (!data.streams || !data.streams.length) {
                // Try movie
                url = `${TORRENTIO_BASE}/stream/movie/${currentImdbId}.json`;
                res = await fetch(url);
                data = await res.json();
            }
            
            renderEpisodes(data.streams, 'torrentio');
            document.getElementById('episodes-container').classList.remove('hidden');
        }

        async function fetchOrion() {
            if (!currentImdbId) throw new Error('No IMDb ID');
            const url = `https://stremio-orionoid.strem.fun/stream/series/${currentImdbId}:1:1.json`;
            const res = await fetch(url);
            const data = await res.json();
            renderEpisodes(data.streams, 'orion');
            document.getElementById('episodes-container').classList.remove('hidden');
        }

        function renderEpisodes(items, source) {
            if (!items || !items.length) {
                epList.innerHTML = '<p class="text-gray-500">No streams found.</p>';
                return;
            }

            if (source === 'consumet') {
                epList.innerHTML = items.map(ep => `
                    <button class="episode-btn focusable" onclick="playStream('${ep.id}', 'consumet')" tabindex="0">
                        EP ${ep.number}
                    </button>
                `).join('');
            } else {
                epList.innerHTML = items.map((s, idx) => `
                    <button class="episode-btn focusable" onclick="playDirectStream('${s.url || ''}', '${s.infoHash || ''}')" tabindex="0">
                        ${s.name || 'Stream'} - ${idx + 1}
                    </button>
                `).join('');
            }
        }

        async function playStream(id, source) {
            showLoader(true);
            try {
                if (source === 'consumet') {
                    const res = await fetch(`${CONSUMET_BASE}/watch/${id}`);
                    const data = await res.json();
                    const hlsSource = data.sources.find(s => s.url.includes('.m3u8'));
                    const url = hlsSource ? hlsSource.url : (data.sources[0]?.url);
                    if (url) loadStream(url);
                }
            } catch (err) { showError("Stream error."); }
            showLoader(false);
        }

        function playDirectStream(url, hash) {
            if (url) {
                loadStream(url);
            } else if (hash) {
                // If it's only a hash, we'd need a debrid client or a local stremio-service
                showError("Direct link missing (Magnet).");
            }
        }

        function loadStream(url) {
            video.classList.remove('hidden');
            if (Hls.isSupported() && url.includes('.m3u8')) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log(e)));
            } else {
                video.src = url;
                video.play().catch(e => console.log(e));
            }
        }

        function renderGrid(results, gridId) {
            const grid = document.getElementById(gridId);
            if (!results.length) {
                grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No results found.</p>';
                return;
            }
            grid.innerHTML = results.map(item => `
                <div class="focusable poster-card glass neon-border group cursor-pointer" 
                     onclick="fetchInfo('${item.mal_id}')" tabindex="0">
                    <img src="${item.images.jpg.large_image_url}" class="aspect-[2/3] object-cover w-full" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                    <div class="play-overlay"><i class="fa fa-play-circle text-4xl text-white"></i></div>
                    <div class="p-3">
                        <p class="text-xs font-bold truncate">${item.title}</p>
                    </div>
                </div>
            `).join('');
        }

        function closePlayer() {
            modal.style.display = 'none';
            if (hls) hls.destroy();
            video.pause();
            video.src = '';
            isModalOpen = false;
        }

        function showLoader(show) {
            loader.style.display = show ? 'flex' : 'none';
        }

        document.getElementById('search-form').onsubmit = (e) => {
            e.preventDefault();
            const query = document.getElementById('search-input').value;
            if (query) searchAnime(query);
        };

        document.addEventListener('keydown', (e) => {
            const focusables = Array.from(document.querySelectorAll('.focusable, .poster-card, .episode-btn, .source-btn, [tabindex="0"]'));
            const currentIndex = focusables.indexOf(document.activeElement);

            if (isModalOpen && (e.key === 'Escape' || e.key === 'Backspace')) {
                closePlayer();
                e.preventDefault();
            }

            if (e.key === 'ArrowRight') {
                const next = focusables[currentIndex + 1] || focusables[0];
                if (next) next.focus();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                const prev = focusables[currentIndex - 1] || focusables[focusables.length - 1];
                if (prev) prev.focus();
                e.preventDefault();
            } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                const currentRect = document.activeElement.getBoundingClientRect();
                let bestMatch = null;
                let minDiff = Infinity;
                focusables.forEach(el => {
                    const rect = el.getBoundingClientRect();
                    const isBelow = e.key === 'ArrowDown' ? rect.top >= currentRect.bottom : rect.bottom <= currentRect.top;
                    if (isBelow) {
                        const diff = Math.abs(rect.left - currentRect.left);
                        if (diff < minDiff) { minDiff = diff; bestMatch = el; }
                    }
                });
                if (bestMatch) bestMatch.focus();
                e.preventDefault();
            } else if (e.key === 'Enter') {
                if (document.activeElement.tagName === 'INPUT') return;
                document.activeElement.click();
            }
        });

        window.onload = () => {
            fetchTrending();
            const searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.focus();
        };
    </script>
</body>
</html>
